<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GeoCopilot cover</title>
  <desc id="desc">A light geospatial AI interface with a 3D building scene and natural language command panel.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#effcff"/>
      <stop offset="0.46" stop-color="#f6fbf2"/>
      <stop offset="1" stop-color="#f5f0ff"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#f4f8ff" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="building" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7de3d7"/>
      <stop offset="1" stop-color="#5b8df6"/>
    </linearGradient>
    <linearGradient id="buildingWarm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff1a7"/>
      <stop offset="1" stop-color="#f5a66a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#537092" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="56" height="56" patternUnits="userSpaceOnUse">
      <path d="M56 0H0V56" fill="none" stroke="#7aa2bd" stroke-width="1" stroke-opacity="0.14"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#sky)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

