<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">GeoCopilot OpenGMS-Jupyter-Agent cover</title>
  <desc id="desc">A light JupyterLab notebook interface with an AI agent sidebar writing and repairing geospatial analysis cells.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5fbff"/>
      <stop offset="0.48" stop-color="#f9fbf4"/>
      <stop offset="1" stop-color="#f4f1ff"/>
    </linearGradient>
    <linearGradient id="mint" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#62d7c5"/>
      <stop offset="1" stop-color="#3694ff"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0b3"/>
      <stop offset="1" stop-color="#f5a36d"/>
    </linearGradient>
    <linearGradient id="violet" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ece4ff"/>
      <stop offset="1" stop-color="#a88bff"/>
    </linearGradient>
    <filter id="shadow" x="-18%" y="-18%" width="136%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#53657f" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="52" height="52" patternUnits="userSpaceOnUse">
      <path d="M52 0H0V52" fill="none" stroke="#7c99ae" stroke-width="1" stroke-opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1200" height="675" rx="34" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#grid)"/>

  <g opacity="0.78">
    <path d="M104 516C235 432 329 411 453 456C585 504 675 480 788 382C878 304 968 285 1084 318" fill="none" stroke="#63cabb" stroke-width="5" stroke-linecap="round"/>
    <path d="M127 562C275 474 397 462 532 522C654 576 792 527 1005 402" fill="none" stroke="#a98ef4" stroke-width="3" stroke-linecap="round" stroke-opacity="0.7"/>
  </g>

  <g transform="translate(86 74)" filter="url(#shadow)">
    <rect width="1030" height="520" rx="28" fill="#ffffff" fill-opacity="0.86" stroke="#dbe5ef"/>

    <g>
      <rect width="1030" height="54" rx="28" fill="#101725"/>
      <path d="M0 28C0 12.5 12.5 0 28 0h974c15.5 0 28 12.5 28 28v26H0Z" fill="#101725"/>
      <circle cx="36" cy="27" r="8" fill="#ff7979"/>
      <circle cx="62" cy="27" r="8" fill="#ffc861"/>
      <circle cx="88" cy="27" r="8" fill="#67d0ad"/>
      <text x="129" y="33" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#eef4ff">OpenGMS-Jupyter-Agent</text>
      <rect x="800" y="14" width="178" height="26" rx="13" fill="#ffffff" fill-opacity="0.12"/>
      <text x="824" y="32" font-family="IBM Plex Mono, Menlo, monospace" font-size="11" font-weight="600" fill="#cbd7e7">Notebook-aware AI</text>
    </g>

    <g transform="translate(24 78)">
      <rect width="210" height="402" rx="22" fill="#f5f8fb" stroke="#dde7f0"/>
      <text x="24" y="39" font-family="IBM Plex Mono, Menlo, monospace" font-size="12" font-weight="700" fill="#768396">EXPLORER</text>
      <rect x="22" y="62" width="166" height="34" rx="12" fill="#ffffff" stroke="#dfe8f1"/>
      <circle cx="42" cy="79" r="7" fill="none" stroke="#8ba3b8" stroke-width="2"/>
      <path d="M47 84l8 8" stroke="#8ba3b8" stroke-width="2" stroke-linecap="round"/>
      <text x="64" y="84" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="13" font-weight="700" fill="#8b98aa">Search files...</text>

      <g transform="translate(22 132)" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e2a3a">
        <path d="M0 0h15l6 7h60v22H0Z" fill="#ffffff" stroke="#dce6ef"/>
        <text x="34" y="20">data</text>
        <path d="M0 58h15l6 7h78v22H0Z" fill="#ffffff" stroke="#dce6ef"/>
        <text x="34" y="78">outputs</text>
        <rect x="0" y="116" width="154" height="36" rx="10" fill="#e9f8f6" stroke="#b9eee4"/>
        <text x="34" y="140">analysis.ipynb</text>
      </g>
    </g>

    <g transform="translate(260 78)">
      <rect width="474" height="402" rx="22" fill="#fbfcfd" stroke="#dde7f0"/>
      <text x="28" y="40" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="700" fill="#7f8b9d">root › analysis.ipynb</text>

      <g transform="translate(28 68)">
        <rect width="418" height="90" rx="18" fill="#ffffff" stroke="#e2e9f0"/>
        <text x="22" y="34" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="700" fill="#98a2b3">In [1]:</text>
        <text x="88" y="34" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#14946f">import geopandas as gpd</text>
        <text x="88" y="60" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#3c83ee">run_model("watershed")</text>
      </g>

      <g transform="translate(28 180)">
        <rect width="418" height="96" rx="18" fill="#fffaf1" stroke="#f1d7a6"/>
        <text x="22" y="34" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="700" fill="#b28b43">Out [1]:</text>
        <path d="M92 54c42-40 88 20 135-15s93-4 144-34" fill="none" stroke="#f1a35f" stroke-width="4" stroke-linecap="round"/>
        <circle cx="92" cy="54" r="5" fill="#f1a35f"/>
        <circle cx="227" cy="39" r="5" fill="#62d7c5"/>
        <circle cx="371" cy="5" r="5" fill="#8e79f2"/>
      </g>

      <g transform="translate(28 300)">
        <rect width="418" height="72" rx="18" fill="#f7f5ff" stroke="#ddd3ff"/>
        <text x="22" y="31" font-family="IBM Plex Mono, Menlo, monospace" font-size="13" font-weight="700" fill="#9278df">In [2]:</text>
        <text x="88" y="31" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#1d2737"># GeoCopilot inserts next cell</text>
        <text x="88" y="55" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="700" fill="#6c55c7">plot_results(outputs)</text>
      </g>
    </g>

    <g transform="translate(760 78)">
      <rect width="246" height="402" rx="22" fill="#ffffff" stroke="#dce7f0"/>
      <rect x="20" y="20" width="130" height="32" rx="16" fill="#eafaf6" stroke="#b9eee4"/>
      <text x="41" y="42" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="14" font-weight="800" fill="#0f8874">GeoCopilot</text>
      <text x="20" y="86" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="22" font-weight="800" fill="#111827">AI Agent</text>
      <text x="20" y="112" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="13" font-weight="600" fill="#697789">Reads notebook context and acts in place</text>

      <g transform="translate(20 146)">
        <rect width="206" height="58" rx="17" fill="#f7fbff" stroke="#dce8f2"/>
        <circle cx="29" cy="29" r="13" fill="url(#mint)"/>
        <text x="53" y="26" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#152235">Read context</text>
        <text x="53" y="44" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#758195">Notebook + files</text>
      </g>

      <g transform="translate(20 218)">
        <rect width="206" height="58" rx="17" fill="#fffaf1" stroke="#f0d9ae"/>
        <circle cx="29" cy="29" r="13" fill="url(#amber)"/>
        <text x="53" y="26" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#152235">Write & run cell</text>
        <text x="53" y="44" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#758195">Code + Markdown</text>
      </g>

      <g transform="translate(20 290)">
        <rect width="206" height="58" rx="17" fill="#f8f5ff" stroke="#ddd2ff"/>
        <circle cx="29" cy="29" r="13" fill="url(#violet)"/>
        <text x="53" y="26" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="13" font-weight="800" fill="#152235">Repair errors</text>
        <text x="53" y="44" font-family="IBM Plex Sans, Inter, Arial, sans-serif" font-size="11" font-weight="600" fill="#758195">Traceback aware</text>
      </g>
    </g>
  </g>

  <g transform="translate(190 572)">
    <rect width="820" height="54" rx="27" fill="#ffffff" fill-opacity="0.78" stroke="#d9e4ee"/>
    <text x="34" y="35" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="800" fill="#687789">Notebook-aware context</text>
    <circle cx="247" cy="27" r="5" fill="#62d7c5"/>
    <text x="272" y="35" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="800" fill="#687789">Insert and re-run cells</text>
    <circle cx="501" cy="27" r="5" fill="#f5a36d"/>
    <text x="526" y="35" font-family="IBM Plex Mono, Menlo, monospace" font-size="14" font-weight="800" fill="#687789">File and terminal tools</text>
  </g>
</svg>
